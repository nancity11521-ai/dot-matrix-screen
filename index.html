<style>
:root{--bg:#0b1014;--panel:#121a20;--line:#26343e;--muted:#81929e;--text:#edf3f6;--accent:#ffd66b;--accent2:#86f0c0}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#24313a 0,#0b1014 48%);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}
button,input,select{font:inherit}.shell{max-width:1440px;margin:auto;padding:24px}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;gap:12px;align-items:center}.logo{width:38px;height:38px;border:1px solid #52616b;border-radius:50%;display:grid;place-items:center;background:#080c0f;box-shadow:inset 0 0 18px #ffffff0e}.logo i{width:5px;height:5px;background:var(--accent);box-shadow:9px 0 var(--accent),-9px 0 var(--accent),0 9px var(--accent),0 -9px var(--accent)}h1{font-size:18px;margin:0;letter-spacing:.14em}.sub{color:var(--muted);font-size:12px;margin-top:3px}.status{font-size:12px;color:var(--accent2);border:1px solid #315547;background:#14251f;padding:7px 11px;border-radius:999px}
.layout{display:grid;grid-template-columns:270px minmax(420px,1fr) 340px;gap:16px}.panel{background:linear-gradient(180deg,#151e25,#10171c);border:1px solid var(--line);border-radius:18px;box-shadow:0 22px 50px #0007}.controls{padding:18px}.section{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid #24313a}.section:last-child{border:0;margin:0;padding:0}.section h2,.library h2{font-size:12px;letter-spacing:.12em;color:#a9b6be;margin:0 0 13px;text-transform:uppercase}.field{margin:12px 0}.field label{display:flex;justify-content:space-between;color:#aebac1;font-size:12px;margin-bottom:7px}.field output{color:var(--accent)}input[type=number],select{width:100%;background:#0b1115;color:var(--text);border:1px solid #33434e;border-radius:10px;padding:10px 11px;outline:none}input[type=range]{width:100%;accent-color:var(--accent)}.swatches{display:flex;gap:8px}.swatch{width:30px;height:30px;border:2px solid transparent;border-radius:50%;cursor:pointer}.swatch.active{border-color:white;box-shadow:0 0 0 2px #ffffff20}.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}.btn{border:1px solid #34444f;background:#18222a;color:#dce5ea;border-radius:10px;padding:9px 10px;cursor:pointer;transition:.18s}.btn:hover{border-color:#657681;transform:translateY(-1px)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#201a09;font-weight:700}.btn.active{background:#273945;border-color:#7794a5}.hint{font-size:11px;color:#738691;line-height:1.6;margin:10px 0 0}
.stage{min-height:720px;padding:20px;display:flex;flex-direction:column}.stage-head{display:flex;align-items:center;justify-content:space-between}.stage-head strong{font-size:14px}.stage-head span{font-size:11px;color:var(--muted)}.screen-wrap{flex:1;display:grid;place-items:center;position:relative;min-height:520px}.halo{position:absolute;width:min(72%,540px);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#ffd66b13 0,#ffd66b05 42%,transparent 70%);filter:blur(12px)}canvas{position:relative;width:min(78%,590px);aspect-ratio:1;border-radius:50%;background:#050709;border:1px solid #3b474e;box-shadow:0 32px 90px #000, inset 0 0 65px #000;cursor:crosshair}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.metric{background:#0c1216;border:1px solid #223039;border-radius:12px;padding:11px}.metric b{display:block;font-size:18px}.metric span{font-size:10px;color:var(--muted)}

<body>
<div class="shell">
 <header class="topbar"><div class="brand"><div class="logo"><i></i></div><div><h1>DOT LAB</h1><div class="sub">圆形点阵屏图案与动画定制器</div></div></div><div class="status" id="status">● 188 个物理像素已就绪</div></header>
 <div class="layout">
  <aside class="panel controls">
   <div class="section"><h2>硬件规格</h2><div class="field"><label>物理灯数 <output id="countOut">188</output></label><input id="count" type="number" min="12" max="500" value="188"></div><div class="btnrow"><button class="btn" data-count="96">96 点</button><button class="btn active" data-count="188">188 点</button><button class="btn" data-count="256">256 点</button><button class="btn" data-count="320">320 点</button></div><p class="hint">修改数量后自动重建圆形物理灯板，图案始终不会使用板外像素。</p></div>
   <div class="section"><h2>动画控制</h2><div class="btnrow"><button class="btn primary" id="play">▶ 播放</button><button class="btn" id="step">下一帧</button></div><div class="field"><label>播放速度 <output id="speedOut">6 FPS</output></label><input id="speed" type="range" min="1" max="16" value="6"></div><div class="field"><label>亮度 <output id="brightOut">90%</output></label><input id="bright" type="range" min="20" max="100" value="90"></div><div class="field"><label>电量百分比 <output id="batteryOut">20%</output></label><input id="battery" type="range" min="0" max="100" value="20"></div><div class="field"><label>温度 <output id="temperatureOut">37°</output></label><input id="temperature" type="range" min="0" max="60" value="37"></div></div>
   <div class="section"><h2>灯光颜色</h2><div class="swatches" id="swatches"><button class="swatch active" style="background:#fff3cf" data-color="#fff3cf"></button><button class="swatch" style="background:#ffd45e" data-color="#ffd45e"></button><button class="swatch" style="background:#f4f6ff" data-color="#f4f6ff"></button><button class="swatch" style="background:#ff9d6b" data-color="#ff9d6b"></button><button class="swatch" style="background:#7debc0" data-color="#7debc0"></button></div></div>
   <div class="section"><h2>手绘图案</h2><div class="btnrow"><button class="btn" id="custom">进入绘制</button><button class="btn" id="clear">清空画布</button></div><p class="hint">进入绘制后，点击灯珠切换亮灭；拖动可连续点亮。自定义结果保留在当前页面。</p></div>
  </aside>
  <main class="panel stage">
   <div class="stage-head"><strong id="patternName">轨道 · ORBIT</strong><span id="modeText">预设动画</span></div>
   <div class="screen-wrap"><div class="halo"></div><canvas id="matrix" width="760" height="760"></canvas></div>
   <div class="metrics"><div class="metric"><b id="totalMetric">188</b><span>物理灯数</span></div><div class="metric"><b id="litMetric">0</b><span>当前点亮</span></div><div class="metric"><b id="frameMetric">01 / 24</b><span>动画帧</span></div></div>
  </main>
  <aside class="panel library"><h2>图案与场景</h2><div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="system">系统</button><button class="tab" data-filter="life">生活</button><button class="tab" data-filter="emotion">情绪</button></div><div class="preset-grid" id="presets"></div><div class="footer-note">所有预设均为实时计算图案，不是贴图。切换物理灯数后会自动适配新的点阵布局。</div></aside>
 </div>
</div>
<script>
const $=s=>document.querySelector(s), canvas=$('#matrix'),ctx=canvas.getContext('2d');
const state={count:188,points:[],pitch:.125,pattern:0,phase:0,playing:false,fps:6,color:'#fff3cf',brightness:.9,custom:false,customOn:new Set(),drag:false,last:0};let batteryLevel=20,temperatureLevel=37;
const near=(v,t=.11)=>Math.abs(v)<t,ring=(x,y,r,t=.08)=>Math.abs(Math.hypot(x,y)-r)<t,rot=(x,y,a)=>({x:x*Math.cos(a)-y*Math.sin(a),y:x*Math.sin(a)+y*Math.cos(a)});
const heart=(x,y,s=.75)=>{x/=s;y/=s;return Math.pow(x*x+y*y-.43,3)-x*x*y*y*y<0&&y<.58};
const heartMask=['01100000110','11110001111','11111011111','11111111111','11111111111','01111111110','00111111100','00011111000','00001110000','00000100000'];
function heartPixel(x,y,scale=1){let gx=Math.round(x/scale*8+7.5)-2,gy=Math.round(y/scale*8+7.5)-4;return gy>=0&&gy<heartMask.length&&gx>=0&&gx<11&&heartMask[gy][gx]==='1'}
const okMask=['00000100100100','00000100100100','00000100100100','00000100101000','00000101010000','00111010110000','01000110110000','01000111110000','01000111110000','00111011110000','00000111100000','00000111000000','00000011000000','00000000000000'];
const crossMask=['00000110000000','00000011000000','00000001100000','00000000110000','00011100011000','00111110110000','01111111100000','00111111000000','00011110000000','00001100000000','00001100000000','00011000000000','00011000000000','00000000000000'];
const likeMask=['00000011000000','00000011000000','00000110000000','00001100000000','00011000000000','00011011111000','00111111111100','11111111111100','11111111111100','11111111111000','11111111110000','11111111100000','00111111000000','00000000000000'];
function gestureMaskPixel(mask,x,y,scale=1,angle=0){let q=rot(x/scale,y/scale,-angle),w=mask[0].length,h=mask.length,gx=Math.round(q.x*8+7.5)-Math.floor((16-w)/2),gy=Math.round(q.y*8+7.5)-Math.floor((16-h)/2);return gy>=0&&gy<h&&gx>=0&&gx<w&&mask[gy][gx]==='1'}
const waveHeights=[.12,.18,.1,.32,.58,.28,.46,.2,.14,.38,.22,.52,.3,.16,.1];
function voiceWavePixel(x,y,frame){let col=Math.round(x*8),cx=col/8;if(Math.abs(x)>.9)return false;if(Math.abs(y-.0625)<.045)return true;if(col<-7||col>7||Math.abs(x-cx)>.07)return false;let base=waveHeights[col+7],motion=.14*Math.sin(frame*.47+col*1.31)+.08*Math.sin(frame*.23-col*.73),height=Math.max(.12,Math.min(.72,base+motion));return Math.abs(y)<height}
const digits={0:['111','101','101','101','111'],1:['010','110','010','010','111'],2:['111','001','111','100','111'],3:['111','001','111','001','111'],4:['101','101','111','001','001'],5:['111','100','111','001','111'],6:['111','100','111','101','111'],7:['111','001','010','010','010'],8:['111','101','111','101','111'],9:['111','101','111','001','111']};
function clockPixel(x,y,p){let now=new Date(),txt=String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0'),gx=Math.round(x*8+7.5),row=Math.round(y*8+7.5),gy=row-6;if(gy<0||gy>4)return false;if(gx===7)return p%12<7&&(gy===1||gy===3);let slots=[[0,1],[1,4],[2,8],[3,11]];for(let [di,start] of slots)if(gx>=start&&gx<start+3)return digits[txt[di]][gy][gx-start]==='1';return false}
const percentGlyph=['1001','0010','0100','1000','1001'];
function batteryPercentPixel(x,y,frame){let shown=Math.round(batteryLevel*Math.min(1,(frame%24)/12)),txt=String(shown),gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,total=txt.length*3+Math.max(0,txt.length-1)+1+4,start=Math.floor((16-total)/2);if(gy<0||gy>4)return false;for(let i=0;i<txt.length;i++){let at=start+i*4;if(gx>=at&&gx<at+3)return digits[txt[i]][gy][gx-at]==='1'}let pct=start+txt.length*4;return gx>=pct&&gx<pct+4&&percentGlyph[gy][gx-pct]==='1'}
const degreeGlyph=['111','101','111'];
function temperaturePixel(x,y,frame){let shown=Math.round(temperatureLevel*Math.min(1,(frame%24)/12)),txt=String(shown),gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,total=txt.length*3+Math.max(0,txt.length-1)+1+3,start=Math.floor((16-total)/2);if(gy<0||gy>4)return false;for(let i=0;i<txt.length;i++){let at=start+i*4;if(gx>=at&&gx<at+3)return digits[txt[i]][gy][gx-at]==='1'}let deg=start+txt.length*4;return gy<3&&gx>=deg&&gx<deg+3&&degreeGlyph[gy][gx-deg]==='1'}
const patterns=[
 {name:'轨道 · ORBIT',cat:'system',icon:'◎',frames:24,fn:(x,y,p)=>{let q=rot(x,y,p*.12);return ring(x,y,.67,.07)||(ring(x,y,.34,.065)&&q.x<.32)||Math.hypot(q.x-.62,q.y+.12)<.12}},
 {name:'脉冲 · PULSE',cat:'system',icon:'◉',frames:18,fn:(x,y,p)=>ring(x,y,.18+(p%18)/18*.68,.075)||Math.hypot(x,y)<.1},
 {name:'像素雨 · RAIN',cat:'life',icon:'⋮',frames:16,fn:(x,y,p,i)=>((i*5+(Math.round((y+1)*8)+p)*3)%13<2)&&((i+p)%4!==0)},
 {name:'星罗盘 · COMPASS',cat:'system',icon:'✦',frames:24,fn:(x,y,p)=>{let q=rot(x,y,p*.1);return near(q.x,.065)&&Math.abs(q.y)<.76||near(q.y,.065)&&Math.abs(q.x)<.76||ring(x,y,.8,.045)&&q.y<-.28}},
 {name:'声波 · WAVE',cat:'life',icon:'≋',frames:24,fn:(x,y,p)=>voiceWavePixel(x,y,p)},
 {name:'绽放 · BLOOM',cat:'emotion',icon:'✣',frames:20,fn:(x,y,p)=>{let a=Math.atan2(y,x),r=Math.hypot(x,y),e=.25+(p%20)/20*.55;return Math.abs(Math.sin(4*a+p*.08))>.65&&r>.13&&r<e}},
 {name:'时砂 · FOCUS',cat:'system',icon:'⌛',frames:24,fn:(x,y,p)=>{let t=-.45+(p%24)/24*.9;return Math.abs(x)<(.09+Math.abs(y)*.58)&&Math.abs(y)<.7&&(y<t-.08||y>t+.28||Math.abs(x)<.07)}},
 {name:'空间门 · PORTAL',cat:'system',icon:'▣',frames:18,fn:(x,y,p)=>{let m=Math.max(Math.abs(x),Math.abs(y)),t=(p%18)/18*.14;return [.2+t,.43+t/2,.69-t/2].some(v=>Math.abs(m-v)<.065)}},
 {name:'萤火 · FIREFLY',cat:'emotion',icon:'⁙',frames:20,fn:(x,y,p,i)=>((i*7+Math.round(y*11)+p)%19<2)||Math.hypot(x+.35-p%10*.02,y-.22)<.14},
 {name:'地平线 · DAWN',cat:'life',icon:'☀',frames:20,fn:(x,y,p)=>{let h=.35-(p%20)/20*.65;return near(y-h,.065)&&Math.abs(x)<.85||(y<h&&Math.abs(Math.hypot(x,y-h)-.42)<.09)}},
 {name:'情绪眼睛 · EYES',cat:'emotion',icon:'◉◉',frames:16,fn:(x,y,p)=>{let blink=p%16>11;return blink?near(y,.07)&&((x>.12&&x<.72)||(x<-.12&&x>-.72)):(((Math.hypot(x-.38,y)-.25<.075)||(Math.hypot(x+.38,y)-.25<.075))&&Math.abs(y)<.3)}},
 {name:'心意 · HEART',cat:'emotion',icon:'♥',frames:24,fn:(x,y,p)=>{let t=p%24;if(t<2)return false;let u=Math.min(1,(t-2)/13),e=1-Math.pow(1-u,3);return heartPixel(x,y,.12+.88*e)}},
 {name:'充电 · CHARGE',cat:'system',icon:'▥',frames:20,fn:(x,y,p)=>Math.abs(x)<.43&&Math.abs(y)<.58&&(Math.abs(x)>.31||Math.abs(y)>.47)||Math.abs(x)<.26&&y>.42-(p%20)/20*.84&&y<.43},
 {name:'健身 · WORKOUT',cat:'life',icon:'━',frames:18,fn:(x,y,p)=>{let a=Math.sin(p/18*Math.PI*2)*.45,q=rot(x,y,a);return Math.abs(q.y)<.085&&Math.abs(q.x)<.58||Math.abs(q.x)>.52&&Math.abs(q.x)<.8&&Math.abs(q.y)<.28}},
 {name:'天气 · WEATHER',cat:'life',icon:'☂',frames:24,fn:(x,y,p)=>p%24<8?(Math.hypot(x,y)<.3||ring(x,y,.58,.055)):p%24<16?(y<.05&&Math.hypot(x,y)<.5||y>.18&&((Math.round((x+1)*8)+Math.round(y*8)+p)%5===0)):(Math.hypot(x+.12,y)<.5&&Math.hypot(x-.1,y-.08)>.42)},
 {name:'闹钟 · ALARM',cat:'life',icon:'◷',frames:16,fn:(x,y,p)=>ring(x,y,.58,.07)||near(x,.065)&&y<0||near(y,.065)&&x>0||(p%4<2&&ring(x,y,.82,.045)&&y<-.25)},
 {name:'相机 · CAMERA',cat:'life',icon:'▣',frames:18,fn:(x,y,p)=>p%18<12?(Math.abs(x)<.52&&Math.abs(y)<.4&&(Math.abs(x)>.4||Math.abs(y)>.29)||ring(x,y,.22,.08)):ring(x,y,.65,.07)||Math.hypot(x,y)<.15},
 {name:'通知 · NOTIFY',cat:'system',icon:'!',frames:14,fn:(x,y,p)=>Math.hypot(x,y)<(.18+.06*Math.sin(p*.6))||near(x,.07)&&y<-.25&&y>-.72||Math.hypot(x,y-.58)<.1},
 {name:'心跳回响 · HEARTBEAT',cat:'emotion',icon:'♥',frames:32,fn:(x,y,p)=>{let t=p%32;if(t<2)return false;let u=Math.min(1,(t-2)/13),e=1-Math.pow(1-u,3),s=t<16?.12+.88*e:1+(t>23?.055*Math.sin((t-23)/8*Math.PI*2):0);return heartPixel(x,y,s)}},
 {name:'酒瓶旋转 · BOTTLE',cat:'life',icon:'♙',frames:32,fn:(x,y,p)=>{let a=Math.sin(p/32*Math.PI*2)*.48,q=rot(x,y,a),X=q.x,Y=q.y,neck=Math.abs(X)<.14&&Y>-.78&&Y<-.36&&(Math.abs(X)>.055||Y<-.66),body=Math.abs(X)<.42&&Y>-.34&&Y<.67&&(Math.abs(X)>.31||Y>.54),shoulder=Y>-.42&&Y<-.22&&Math.abs(Math.abs(X)-(.14+(Y+.42)*1.35))<.09,label=ring(X,Y-.1,.22,.07);return neck||body||shoulder||label}},
 {name:'数字时间 · CLOCK',cat:'system',icon:'09:00',frames:12,fn:(x,y,p)=>clockPixel(x,y,p)},
 {name:'音乐频谱 · SPECTRUM',cat:'life',icon:'▥▥▥',frames:24,fn:(x,y,p)=>{let col=Math.round(x*8),cx=col/8,h=.15+.62*Math.abs(Math.sin(col*.83+p*.34)*Math.cos(col*.31-p*.21));return Math.abs(x-cx)<.055&&Math.abs(y)<h}},
 {name:'OK 手势 · OK',cat:'emotion',icon:'OK',frames:28,fn:(x,y,p)=>{let t=p%28;if(t<2)return false;let u=Math.min(1,(t-2)/10),s=.18+.82*(1-Math.pow(1-u,3)),a=t>15?.08*Math.sin((t-15)/13*Math.PI*2):0;return gestureMaskPixel(okMask,x,y,s,a)}},
 {name:'指尖交叉 · CROSS',cat:'emotion',icon:'×',frames:28,fn:(x,y,p)=>{let t=p%28;if(t<2)return false;let u=Math.min(1,(t-2)/11),s=.2+.8*(1-Math.pow(1-u,3)),a=t>16?.07*Math.sin((t-16)/12*Math.PI*2):0;return gestureMaskPixel(crossMask,x,y,s,a)}},
 {name:'点赞 · LIKE',cat:'emotion',icon:'＋1',frames:26,fn:(x,y,p)=>{let t=p%26;if(t<2)return false;let u=Math.min(1,(t-2)/10),s=.15+1.02*(1-Math.pow(1-u,3));if(t>12)s=1+.07*Math.sin((t-12)/14*Math.PI*2);return gestureMaskPixel(likeMask,x,y,s,0)}},
 {name:'电量百分比 · BATTERY',cat:'system',icon:'20%',frames:24,fn:(x,y,p)=>batteryPercentPixel(x,y,p)},
 {name:'温度显示 · TEMP',cat:'life',icon:'37°',frames:24,fn:(x,y,p)=>temperaturePixel(x,y,p)}
];
function buildPoints(n){if(n===188){const rows=[4,8,10,12,14,14,16,16,16,16,14,14,12,10,8,4],a=[];rows.forEach((m,r)=>{for(let i=0;i<m;i++)a.push({x:(i-(m-1)/2)/8,y:(r-7.5)/8})});return a}
 let side=Math.ceil(Math.sqrt(n*4/Math.PI));let candidates=[];while(candidates.length<n){side++;candidates=[];for(let r=0;r<side;r++)for(let c=0;c<side;c++){let x=(c-(side-1)/2)/(side/2),y=(r-(side-1)/2)/(side/2);if(x*x+y*y<=1)candidates.push({x,y,d:x*x+y*y})}}candidates.sort((a,b)=>a.d-b.d);let chosen=candidates.slice(0,n),mx=Math.max(...chosen.map(p=>Math.hypot(p.x,p.y)));return chosen.map(p=>({x:p.x/mx*.92,y:p.y/mx*.92}))}
function rebuild(n){state.count=Math.max(12,Math.min(500,Math.round(n)||188));state.points=buildPoints(state.count);let nearest=Infinity;for(let i=0;i<state.points.length;i++)for(let j=i+1;j<state.points.length;j++){let d=Math.hypot(state.points[i].x-state.points[j].x,state.points[i].y-state.points[j].y);if(d>1e-6&&d<nearest)nearest=d}state.pitch=nearest;state.customOn.clear();$('#count').value=state.count;$('#countOut').value=state.count;$('#totalMetric').textContent=state.count;$('#status').textContent=`● ${state.count} 个物理像素已就绪`;document.querySelectorAll('[data-count]').forEach(b=>b.classList.toggle('active',+b.dataset.count===state.count));draw()}
function activeSet(){let set=new Set();if(state.custom)return state.customOn;let pat=patterns[state.pattern];state.points.forEach((p,i)=>{if(pat.fn(p.x,p.y,state.phase,i))set.add(i)});return set}
function draw(){let W=canvas.width,cx=W/2,scale=W*.405,active=activeSet(),cell=Math.max(5,state.pitch*scale*.82);
 ctx.clearRect(0,0,W,W);let bg=ctx.createRadialGradient(cx,cx,20,cx,cx,W/2);bg.addColorStop(0,'#0c1114');bg.addColorStop(1,'#030506');ctx.fillStyle=bg;ctx.fillRect(0,0,W,W);
 state.points.forEach((p,i)=>{let x=cx+p.x*scale,y=cx+p.y*scale,on=active.has(i);ctx.shadowColor=on?state.color:'transparent';ctx.shadowBlur=on?9*state.brightness:0;ctx.fillStyle=on?hexAlpha(state.color,state.brightness):'#172027';ctx.fillRect(x-cell/2,y-cell/2,cell,cell)});ctx.shadowBlur=0;$('#litMetric').textContent=active.size;let frames=state.custom?1:patterns[state.pattern].frames;$('#frameMetric').textContent=`${String(state.phase%frames+1).padStart(2,'0')} / ${frames}`}
function hexAlpha(hex,a){let n=parseInt(hex.slice(1),16),r=n>>16,g=n>>8&255,b=n&255;return`rgba(${r},${g},${b},${a})`}
function selectPattern(i){state.pattern=i;state.phase=0;state.custom=false;$('#patternName').textContent=patterns[i].name;$('#modeText').textContent='预设动画';$('#custom').classList.remove('active');document.querySelectorAll('.preset').forEach((b,j)=>b.classList.toggle('active',j===i));draw()}
function animationCode(i){let p=patterns[i];return `// ${p.name} · 圆形点阵屏动画\n// x/y 为 -1~1 的归一化坐标，frame 为当前帧，index 为物理灯序号。\nconst near=(v,t=.11)=>Math.abs(v)<t;\nconst ring=(x,y,r,t=.08)=>Math.abs(Math.hypot(x,y)-r)<t;\nconst rot=(x,y,a)=>({x:x*Math.cos(a)-y*Math.sin(a),y:x*Math.sin(a)+y*Math.cos(a)});\nconst heartMask=${JSON.stringify(heartMask)};\nfunction heartPixel(x,y,scale=1){let gx=Math.round(x/scale*8+7.5)-2,gy=Math.round(y/scale*8+7.5)-4;return gy>=0&&gy<heartMask.length&&gx>=0&&gx<11&&heartMask[gy][gx]==='1'}\nconst okMask=${JSON.stringify(okMask)},crossMask=${JSON.stringify(crossMask)},likeMask=${JSON.stringify(likeMask)};\n${gestureMaskPixel.toString()}\nconst waveHeights=${JSON.stringify(waveHeights)};\n${voiceWavePixel.toString()}\nconst digits=${JSON.stringify(digits)};\n${clockPixel.toString()}\nlet batteryLevel=${batteryLevel};\nconst percentGlyph=${JSON.stringify(percentGlyph)};\n${batteryPercentPixel.toString()}\nlet temperatureLevel=${temperatureLevel};\nconst degreeGlyph=${JSON.stringify(degreeGlyph)};\n${temperaturePixel.toString()}\n\nconst animation={name:${JSON.stringify(p.name)},frames:${p.frames},isLit:${p.fn.toString()}};\n// 调用：animation.isLit(pixel.x,pixel.y,frame,pixel.index)`}
async function copyAnimation(i,button){let code=animationCode(i);try{await navigator.clipboard.writeText(code)}catch(e){let ta=document.createElement('textarea');ta.value=code;ta.style.position='fixed';ta.style.opacity='0';document.body.append(ta);ta.select();document.execCommand('copy');ta.remove()}let old=button.textContent;button.textContent='✓ 已复制';$('#status').textContent=`✓ 已复制「${patterns[i].name.split(' · ')[0]}」动画代码`;setTimeout(()=>{button.textContent=old;$('#status').textContent=`● ${state.count} 个物理像素已就绪`},1800)}
function renderPresets(filter='all'){let box=$('#presets');box.innerHTML='';patterns.forEach((p,i)=>{if(filter!=='all'&&p.cat!==filter)return;let b=document.createElement('div');b.className='preset'+(i===state.pattern?' active':'');b.innerHTML=`<div class="preset-preview">${p.icon}</div><b>${p.name.split(' · ')[0]}</b><div class="preset-foot"><small>${p.frames} 帧动画</small><button class="copy-code">复制代码</button></div>`;b.onclick=()=>selectPattern(i);b.querySelector('.copy-code').onclick=e=>{e.stopPropagation();copyAnimation(i,e.currentTarget)};box.append(b)})}
function tick(t){if(state.playing&&t-state.last>1000/state.fps){state.phase++;state.last=t;draw()}requestAnimationFrame(tick)}
$('#play').onclick=()=>{state.playing=!state.playing;$('#play').textContent=state.playing?'❚❚ 暂停':'▶ 播放';$('#play').classList.toggle('primary',!state.playing)};
$('#step').onclick=()=>{state.phase++;draw()};$('#count').onchange=e=>rebuild(+e.target.value);document.querySelectorAll('[data-count]').forEach(b=>b.onclick=()=>rebuild(+b.dataset.count));
$('#speed').oninput=e=>{state.fps=+e.target.value;$('#speedOut').value=state.fps+' FPS'};$('#bright').oninput=e=>{state.brightness=+e.target.value/100;$('#brightOut').value=e.target.value+'%';draw()};$('#battery').oninput=e=>{batteryLevel=+e.target.value;$('#batteryOut').value=batteryLevel+'%';state.phase=13;draw()};$('#temperature').oninput=e=>{temperatureLevel=+e.target.value;$('#temperatureOut').value=temperatureLevel+'°';state.phase=13;draw()};
$('#swatches').onclick=e=>{let b=e.target.closest('.swatch');if(!b)return;state.color=b.dataset.color;document.querySelectorAll('.swatch').forEach(x=>x.classList.toggle('active',x===b));draw()};
$('#custom').onclick=()=>{state.custom=true;state.playing=false;$('#play').textContent='▶ 播放';$('#patternName').textContent='自定义图案 · CUSTOM';$('#modeText').textContent='点击或拖动灯珠';$('#custom').classList.add('active');document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));draw()};
$('#clear').onclick=()=>{state.custom=true;state.customOn.clear();$('#patternName').textContent='自定义图案 · CUSTOM';draw()};
function pointer(e,drag=false){if(!state.custom)return;let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*canvas.width,y=(e.clientY-r.top)/r.height*canvas.height,c=canvas.width/2,scale=canvas.width*.405;let best=-1,dist=1e9;state.points.forEach((p,i)=>{let d=Math.hypot(c+p.x*scale-x,c+p.y*scale-y);if(d<dist){dist=d;best=i}});if(best>=0&&dist<28){if(drag)state.customOn.add(best);else state.customOn.has(best)?state.customOn.delete(best):state.customOn.add(best);draw()}}
canvas.onpointerdown=e=>{state.drag=true;pointer(e)};canvas.onpointermove=e=>{if(state.drag)pointer(e,true)};window.onpointerup=()=>state.drag=false;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));renderPresets(t.dataset.filter)});
let initialPattern=Math.max(0,patterns.findIndex(p=>location.hash&&p.name.toLowerCase().includes(location.hash.slice(1).toLowerCase())));rebuild(188);renderPresets();selectPattern(initialPattern);state.phase=Math.max(0,+new URLSearchParams(location.search).get('frame')||0);draw();requestAnimationFrame(tick);
</script>
</body></html>
