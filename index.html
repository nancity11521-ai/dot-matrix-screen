<body>
<div class="shell">
 <header class="topbar"><div class="brand"><div class="logo"><i></i></div><div><h1>DOT LAB</h1><div class="sub">圆形点阵屏图案与动画定制器</div></div></div><div class="status" id="status">● 188 个物理像素已就绪</div></header>
 <div class="layout">
  <aside class="panel controls">
   <div class="section"><h2>硬件规格</h2><div class="field"><label>物理灯数 <output id="countOut">188</output></label><input id="count" type="number" min="12" max="500" value="188"></div><div class="btnrow"><button class="btn" data-count="96">96 点</button><button class="btn active" data-count="188">188 点</button><button class="btn" data-count="256">256 点</button><button class="btn" data-count="320">320 点</button></div><p class="hint">修改数量后自动重建圆形物理灯板，图案始终不会使用板外像素。</p></div>
   <div class="section"><h2>动画控制</h2><div class="btnrow"><button class="btn primary" id="play">▶ 播放</button><button class="btn" id="step">下一帧</button></div><div class="field"><label>播放速度 <output id="speedOut">6 FPS</output></label><input id="speed" type="range" min="1" max="16" value="6"></div><div class="field"><label>亮度 <output id="brightOut">90%</output></label><input id="bright" type="range" min="20" max="100" value="90"></div><div class="field"><label>显示日期 <output id="dateOut">07/01</output></label><input id="displayDate" type="date" value="2026-07-01"></div><div class="field"><label>电量百分比 <output id="batteryOut">20%</output></label><input id="battery" type="range" min="0" max="100" value="20"></div><div class="field"><label>温度 <output id="temperatureOut">37°</output></label><input id="temperature" type="range" min="0" max="60" value="37"></div><div class="field"><label>指南针方向 <output id="bearingOut">45° NE</output></label><input id="bearing" type="range" min="0" max="359" value="45"></div></div>
   <div class="section"><h2>灯光颜色</h2><div class="swatches" id="swatches"><button class="swatch active" style="background:#fff3cf" data-color="#fff3cf"></button><button class="swatch" style="background:#ffd45e" data-color="#ffd45e"></button><button class="swatch" style="background:#f4f6ff" data-color="#f4f6ff"></button><button class="swatch" style="background:#ff9d6b" data-color="#ff9d6b"></button><button class="swatch" style="background:#7debc0" data-color="#7debc0"></button></div></div>
   <div class="section"><h2>手绘图案</h2><div class="btnrow"><button class="btn" id="custom">进入绘制</button><button class="btn" id="clear">清空画布</button></div><p class="hint">进入绘制后，点击灯珠切换亮灭；拖动可连续点亮。自定义结果保留在当前页面。</p></div>
  </aside>
  <main class="panel stage">
   <div class="stage-head"><strong id="patternName">轨道 · ORBIT</strong><span id="modeText">预设动画</span></div>
   <div class="screen-wrap"><div class="halo"></div><canvas id="matrix" width="760" height="760"></canvas></div>
   <div class="metrics"><div class="metric"><b id="totalMetric">188</b><span>物理灯数</span></div><div class="metric"><b id="litMetric">0</b><span>当前点亮</span></div><div class="metric"><b id="frameMetric">01 / 24</b><span>动画帧</span></div></div>
  </main>
  <aside class="panel library"><h2>图案与场景</h2><div class="tabs"><button class="tab active" data-filter="all">全部</button><button class="tab" data-filter="system">系统</button><button class="tab" data-filter="life">生活</button><button class="tab" data-filter="emotion">情绪</button></div><div class="preset-grid" id="presets"></div><div class="footer-note">所有预设均为实时计算图案，不是贴图。切换物理灯数后会自动适配新的点阵布局。</div></aside>
 </div>
</div>
<script>
const $=s=>document.querySelector(s), canvas=$('#matrix'),ctx=canvas.getContext('2d');
const state={count:188,points:[],pitch:.125,pattern:0,phase:0,playing:false,fps:6,color:'#fff3cf',brightness:.9,custom:false,customOn:new Set(),drag:false,last:0};let batteryLevel=20,temperatureLevel=37,compassBearing=45,selectedDate='2026-07-01';
const near=(v,t=.11)=>Math.abs(v)<t,ring=(x,y,r,t=.08)=>Math.abs(Math.hypot(x,y)-r)<t,rot=(x,y,a)=>({x:x*Math.cos(a)-y*Math.sin(a),y:x*Math.sin(a)+y*Math.cos(a)});
const heart=(x,y,s=.75)=>{x/=s;y/=s;return Math.pow(x*x+y*y-.43,3)-x*x*y*y*y<0&&y<.58};
const heartMask=['01100000110','11110001111','11111011111','11111111111','11111111111','01111111110','00111111100','00011111000','00001110000','00000100000'];
function heartPixel(x,y,scale=1){let gx=Math.round(x/scale*8+7.5)-2,gy=Math.round(y/scale*8+7.5)-4;return gy>=0&&gy<heartMask.length&&gx>=0&&gx<11&&heartMask[gy][gx]==='1'}
const okMask=['00000100100100','00000100100100','00000100100100','00000100101000','00000101010000','00111010110000','01000110110000','01000111110000','01000111110000','00111011110000','00000111100000','00000111000000','00000011000000','00000000000000'];
const crossMask=['00000110000000','00000011000000','00000001100000','00000000110000','00011100011000','00111110110000','01111111100000','00111111000000','00011110000000','00001100000000','00001100000000','00011000000000','00011000000000','00000000000000'];
const likeMask=['00000011000000','00000011000000','00000110000000','00001100000000','00011000000000','00011011111000','00111111111100','11111111111100','11111111111100','11111111111000','11111111110000','11111111100000','00111111000000','00000000000000'];
function gestureMaskPixel(mask,x,y,scale=1,angle=0){let q=rot(x/scale,y/scale,-angle),w=mask[0].length,h=mask.length,gx=Math.round(q.x*8+7.5)-Math.floor((16-w)/2),gy=Math.round(q.y*8+7.5)-Math.floor((16-h)/2);return gy>=0&&gy<h&&gx>=0&&gx<w&&mask[gy][gx]==='1'}
const waveHeights=[.12,.18,.1,.32,.58,.28,.46,.2,.14,.38,.22,.52,.3,.16,.1];
function voiceWavePixel(x,y,frame){let col=Math.round(x*8),cx=col/8;if(Math.abs(x)>.9)return false;if(Math.abs(y-.0625)<.045)return true;if(col<-7||col>7||Math.abs(x-cx)>.07)return false;let base=waveHeights[col+7],motion=.14*Math.sin(frame*.47+col*1.31)+.08*Math.sin(frame*.23-col*.73),height=Math.max(.12,Math.min(.72,base+motion));return Math.abs(y)<height}
const digits={0:['111','101','101','101','111'],1:['010','110','010','010','111'],2:['111','001','111','100','111'],3:['111','001','111','001','111'],4:['101','101','111','001','001'],5:['111','100','111','001','111'],6:['111','100','111','101','111'],7:['111','001','010','010','010'],8:['111','101','111','101','111'],9:['111','101','111','001','111']};
function clockPixel(x,y,p){let now=new Date(),hour=String(now.getHours()).padStart(2,'0'),minute=String(now.getMinutes()).padStart(2,'0'),gx=Math.round(x*8+7.5),row=Math.round(y*8+7.5),line=row>=2&&row<=6?hour:row>=9&&row<=13?minute:null,gy=row<=6?row-2:row-9;if(!line)return p%12<7&&gx===7&&(row===7||row===8);for(let i=0;i<2;i++){let start=4+i*4;if(gx>=start&&gx<start+3)return digits[line[i]][gy][gx-start]==='1'}return false}
const letters={A:['010','101','111','101','101'],D:['110','101','101','101','110'],E:['111','100','110','100','111'],F:['111','100','110','100','100'],H:['101','101','111','101','101'],I:['111','010','010','010','111'],M:['101','111','111','101','101'],N:['101','111','111','111','101'],O:['111','101','101','101','111'],R:['110','101','110','101','101'],S:['111','100','111','001','111'],T:['111','010','010','010','010'],U:['101','101','101','101','111'],W:['101','101','111','111','101']};
function dateDisplayPixel(x,y,frame){let [,m,d]=selectedDate.split('-'),txt=m+d,gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,visible=Math.min(4,Math.floor((frame%24)/3)+1);if(gy<0||gy>4)return false;let slots=[[0,0],[1,3],[2,9],[3,12]];for(let [i,start] of slots)if(i<visible&&gx>=start&&gx<start+3)return digits[txt[i]][gy][gx-start]==='1';let slashX=8-Math.floor(gy/2);return visible>1&&gx===slashX}
function weekdayDisplayPixel(x,y,frame){let [yy,mm,dd]=selectedDate.split('-').map(Number),text=['SUN','MON','TUE','WED','THU','FRI','SAT'][new Date(yy,mm-1,dd).getDay()],gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,visible=Math.min(3,Math.floor((frame%24)/4)+1);if(gy<0||gy>4)return false;for(let i=0;i<visible;i++){let start=2+i*4;if(gx>=start&&gx<start+3)return letters[text[i]][gy][gx-start]==='1'}return false}
const percentGlyph=['1001','0010','0100','1000','1001'];
function batteryPercentPixel(x,y,frame){let shown=Math.round(batteryLevel*Math.min(1,(frame%24)/12)),txt=String(shown),gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,total=txt.length*3+Math.max(0,txt.length-1)+1+4,start=Math.floor((16-total)/2);if(gy<0||gy>4)return false;for(let i=0;i<txt.length;i++){let at=start+i*4;if(gx>=at&&gx<at+3)return digits[txt[i]][gy][gx-at]==='1'}let pct=start+txt.length*4;return gx>=pct&&gx<pct+4&&percentGlyph[gy][gx-pct]==='1'}
const degreeGlyph=['111','101','111'];
function temperaturePixel(x,y,frame){let shown=Math.round(temperatureLevel*Math.min(1,(frame%24)/12)),txt=String(shown),gx=Math.round(x*8+7.5),gy=Math.round(y*8+7.5)-6,total=txt.length*3+Math.max(0,txt.length-1)+1+3,start=Math.floor((16-total)/2);if(gy<0||gy>4)return false;for(let i=0;i<txt.length;i++){let at=start+i*4;if(gx>=at&&gx<at+3)return digits[txt[i]][gy][gx-at]==='1'}let deg=start+txt.length*4;return gy<3&&gx>=deg&&gx<deg+3&&degreeGlyph[gy][gx-deg]==='1'}
function sunWeatherPixel(x,y,frame,ox=0,oy=0,small=false){let q=rot(x-ox,y-oy,frame*.035),r=Math.hypot(q.x,q.y),core=small?.2:.27,inner=r<core,ray=r>(small?.3:.39)&&r<(small?.52:.7)&&(Math.abs(q.x)<.07||Math.abs(q.y)<.07||Math.abs(Math.abs(q.x)-Math.abs(q.y))<.075);return inner||ray}
function cloudWeatherPixel(x,y,ox=0,oy=0){x-=ox;y-=oy;return Math.hypot(x+.34,y+.12)<.28||Math.hypot(x,y+.27)<.36||Math.hypot(x-.38,y+.1)<.27||Math.abs(x)<.68&&y>-.22&&y<.08}
function rainWeatherPixel(x,y,frame){if(cloudWeatherPixel(x,y,0,-.17))return true;let col=Math.round((x+.75)/.25),cx=-.75+col*.25,row=Math.round(y*8),step=((row+frame+col*2)%5+5)%5;return y>.12&&y<.82&&col>=0&&col<=6&&Math.abs(x-cx)<.07&&step<2}
function snowWeatherPixel(x,y,frame){if(cloudWeatherPixel(x,y,0,-.2))return true;let flakes=[[-.48,.3],[0,.48],[.48,.3]],tw=frame%8<4;return flakes.some(([fx,fy],i)=>{let yy=fy+((frame+i*2)%8)*.035,dx=x-fx,dy=y-yy;return Math.abs(dx)<.06&&Math.abs(dy)<.18||Math.abs(dy)<.06&&Math.abs(dx)<.18||(tw&&Math.abs(Math.abs(dx)-Math.abs(dy))<.05&&Math.hypot(dx,dy)<.2)})}
function stormWeatherPixel(x,y,frame){if(cloudWeatherPixel(x,y,0,-.25))return true;let flash=frame%10<6,bolt=flash&&((y>.05&&y<.32&&Math.abs(x+.08)<.1)||(y>.25&&y<.5&&Math.abs(x-.08)<.1)||(y>.45&&y<.7&&Math.abs(x-.22)<.1)),row=Math.round(y*8),side=x<0?0:1,sideRain=y>.15&&y<.78&&Math.abs(x)>.34&&Math.abs(x)<.72&&((row+frame+side*2)%4+4)%4<2;return bolt||sideRain}
function compassArrowPixel(x,y,frame){let target=compassBearing*Math.PI/180,u=Math.min(1,(frame%24)/12),ease=1-Math.pow(1-u,3),q=rot(x,y,-target*ease),head=q.y>-.72&&q.y<-.2&&Math.abs(Math.abs(q.x)-(q.y+.72)*.7)<.075,shaft=Math.abs(q.x)<.065&&q.y>-.58&&q.y<.55,r=Math.hypot(x,y),ticks=r>.77&&r<.87&&(Math.abs(x)<.07||Math.abs(y)<.07),hub=Math.hypot(x,y)<.11;return head||shaft||ticks||hub}
function moodFacePixel(x,y,frame){let state=Math.floor((frame%32)/8),blink=frame%8===7,face=Math.hypot(x,y)<.69;if(!face)return false;let leftEye=blink?Math.abs(y+.22)<.06&&Math.abs(x+.27)<.17:Math.abs(x+.27)<.085&&y>-.4&&y<-.08,rightEye;if(state===1||state===3)rightEye=Math.abs(y+.2)<.06&&Math.abs(x-.27)<.18;else rightEye=blink?Math.abs(y+.22)<.06&&Math.abs(x-.27)<.17:Math.abs(x-.27)<.085&&y>-.4&&y<-.08;let mouth;if(state===0)mouth=Math.abs(x)<.32&&y>.1&&y<.43;else if(state===1)mouth=Math.abs(y-(.12+.42*(x+.05)*(x+.05)))<.075&&Math.abs(x)<.4;else if(state===2)mouth=Math.abs(y-(.1+.6*x*x))<.08&&Math.abs(x)<.43;else mouth=(Math.abs(y-.18)<.07&&Math.abs(x)<.38)||(x>.25&&x<.39&&y>.16&&y<.34);return !(leftEye||rightEye||mouth)}
function segmentPixel(x,y,a,b,t=.1){let vx=b[0]-a[0],vy=b[1]-a[1],u=Math.max(0,Math.min(1,((x-a[0])*vx+(y-a[1])*vy)/(vx*vx+vy*vy)));return Math.hypot(x-a[0]-u*vx,y-a[1]-u*vy)<t}
function littlePersonPixel(x,y,frame){let poses=[[[0,.12],[-.3,.18],[.3,.18],[-.26,.68],[.26,.68]],[[0,.12],[-.65,-.4],[.65,-.4],[-.48,.66],[.48,.66]],[[0,.12],[-.5,-.4],[.44,.08],[-.52,.56],[.42,.67]],[[0,.12],[-.4,-.78],[.4,-.78],[-.28,.65],[.28,.65]]],f=frame%32,s=Math.floor(f/8),n=(s+1)%4,u=Math.max(0,(f%8-5)/3),e=u*u*(3-2*u),p=poses[s].map((v,i)=>[v[0]+(poses[n][i][0]-v[0])*e,v[1]+(poses[n][i][1]-v[1])*e]),bounce=s===1||s===3?-.06*Math.sin((f%8)/7*Math.PI):0;y-=bounce;let [hip,lh,rh,lf,rf]=p,shoulder=[0,-.25];return Math.hypot(x,y+.57)<.13||segmentPixel(x,y,shoulder,hip,.09)||segmentPixel(x,y,shoulder,lh,.09)||segmentPixel(x,y,shoulder,rh,.09)||segmentPixel(x,y,hip,lf,.1)||segmentPixel(x,y,hip,rf,.1)}
const patterns=[
 {name:'轨道 · ORBIT',cat:'system',icon:'◎',frames:24,fn:(x,y,p)=>{let q=rot(x,y,p*.12);return ring(x,y,.67,.07)||(ring(x,y,.34,.065)&&q.x<.32)||Math.hypot(q.x-.62,q.y+.12)<.12}},
 {name:'脉冲 · PULSE',cat:'system',icon:'◉',frames:18,fn:(x,y,p)=>ring(x,y,.18+(p%18)/18*.68,.075)||Math.hypot(x,y)<.1},
 {name:'像素雨 · RAIN',cat:'life',icon:'⋮',frames:16,fn:(x,y,p,i)=>((i*5+(Math.round((y+1)*8)+p)*3)%13<2)&&((i+p)%4!==0)},
 {name:'星罗盘 · COMPASS',cat:'system',icon:'✦',frames:24,fn:(x,y,p)=>{let q=rot(x,y,p*.1);return near(q.x,.065)&&Math.abs(q.y)<.76||near(q.y,.065)&&Math.abs(q.x)<.76||ring(x,y,.8,.045)&&q.y<-.28}},
 {name:'声波 · WAVE',cat:'life',icon:'≋',frames:24,fn:(x,y,p)=>voiceWavePixel(x,y,p)},

$('#play').onclick=()=>{state.playing=!state.playing;$('#play').textContent=state.playing?'❚❚ 暂停':'▶ 播放';$('#play').classList.toggle('primary',!state.playing)};
$('#step').onclick=()=>{state.phase++;draw()};$('#count').onchange=e=>rebuild(+e.target.value);document.querySelectorAll('[data-count]').forEach(b=>b.onclick=()=>rebuild(+b.dataset.count));
$('#speed').oninput=e=>{state.fps=+e.target.value;$('#speedOut').value=state.fps+' FPS'};$('#bright').oninput=e=>{state.brightness=+e.target.value/100;$('#brightOut').value=e.target.value+'%';draw()};$('#displayDate').oninput=e=>{selectedDate=e.target.value||'2026-07-01';let [,m,d]=selectedDate.split('-');$('#dateOut').value=m+'/'+d;state.phase=13;draw()};$('#battery').oninput=e=>{batteryLevel=+e.target.value;$('#batteryOut').value=batteryLevel+'%';state.phase=13;draw()};$('#temperature').oninput=e=>{temperatureLevel=+e.target.value;$('#temperatureOut').value=temperatureLevel+'°';state.phase=13;draw()};$('#bearing').oninput=e=>{compassBearing=+e.target.value;let dirs=['N','NE','E','SE','S','SW','W','NW'];$('#bearingOut').value=compassBearing+'° '+dirs[Math.round(compassBearing/45)%8];state.phase=0;draw()};
$('#swatches').onclick=e=>{let b=e.target.closest('.swatch');if(!b)return;state.color=b.dataset.color;document.querySelectorAll('.swatch').forEach(x=>x.classList.toggle('active',x===b));draw()};
$('#custom').onclick=()=>{state.custom=true;state.playing=false;$('#play').textContent='▶ 播放';$('#patternName').textContent='自定义图案 · CUSTOM';$('#modeText').textContent='点击或拖动灯珠';$('#custom').classList.add('active');document.querySelectorAll('.preset').forEach(b=>b.classList.remove('active'));draw()};
$('#clear').onclick=()=>{state.custom=true;state.customOn.clear();$('#patternName').textContent='自定义图案 · CUSTOM';draw()};
function pointer(e,drag=false){if(!state.custom)return;let r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)/r.width*canvas.width,y=(e.clientY-r.top)/r.height*canvas.height,c=canvas.width/2,scale=canvas.width*.405;let best=-1,dist=1e9;state.points.forEach((p,i)=>{let d=Math.hypot(c+p.x*scale-x,c+p.y*scale-y);if(d<dist){dist=d;best=i}});if(best>=0&&dist<28){if(drag)state.customOn.add(best);else state.customOn.has(best)?state.customOn.delete(best):state.customOn.add(best);draw()}}
canvas.onpointerdown=e=>{state.drag=true;pointer(e)};canvas.onpointermove=e=>{if(state.drag)pointer(e,true)};window.onpointerup=()=>state.drag=false;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));renderPresets(t.dataset.filter)});
let initialPattern=Math.max(0,patterns.findIndex(p=>location.hash&&p.name.toLowerCase().includes(location.hash.slice(1).toLowerCase())));rebuild(188);renderPresets();selectPattern(initialPattern);state.phase=Math.max(0,+new URLSearchParams(location.search).get('frame')||0);draw();requestAnimationFrame(tick);
</script>
</body></html>
